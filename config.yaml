model:
  name: "jepacluster-v1"
  # sliding window size (N logs) for context and target
  window_size: 10
  # latent dimension of context and target vectors (smaller is faster, larger is more accurate)
  latent_dim: 128
  # context encoder settings
  encoder:
    num_layers: 4
    num_heads: 8
    dropout: 0.1
  # predictor must stay smaller than the encoder (fewer layers, narrower FFN, fewer heads); see JEPAArchitecture
  predictor:
    hidden_dim: 256
    num_layers: 2
    num_heads: 4

training:
  batch_size: 32
  learning_rate: 3e-4
  epochs: 1
  max_steps: 25000
  ema_decay: 0.99
  loss_type: "l2"
  warmup_epochs: 2
  weight_decay: 0.0005
  clip_grad_norm: 1.0

clustering:
  # dimensionality reduction before clustering (accelerates HDBSCAN)
  umap:
    n_components: 5
    n_neighbors: 15
    min_dist: 0.1
  # density-based clustering (HDBSCAN)
  hdbscan:
    min_cluster_size: 10
    min_samples: 5
    # probability threshold to consider a log as 'clustered' vs 'noise'
    prediction_threshold: 0.7
